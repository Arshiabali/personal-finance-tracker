<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Finance Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #005B8E, #0077b6);
      color: white;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(0,91,142,0.3);
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header span { font-size: 1.6rem; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    /* ── Summary Cards ── */
    .cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      text-align: center;
    }
    .card .label { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .card .amount { font-size: 1.8rem; font-weight: 700; margin-top: 6px; }
    .card.income  .amount { color: #2d6a4f; }
    .card.expense .amount { color: #c1121f; }
    .card.balance .amount { color: #005B8E; }

    /* ── Main Layout ── */
    .main { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }

    /* ── Form Panel ── */
    .panel {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .panel h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: #005B8E; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 5px; color: #444; }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #dde3ea;
      border-radius: 8px;
      font-size: 0.92rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus { outline: none; border-color: #005B8E; }

    .type-toggle { display: flex; gap: 8px; }
    .type-toggle button {
      flex: 1;
      padding: 9px;
      border: 1.5px solid #dde3ea;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.88rem;
      transition: all 0.2s;
    }
    .type-toggle button.active.income-btn  { background: #d8f3dc; border-color: #2d6a4f; color: #2d6a4f; }
    .type-toggle button.active.expense-btn { background: #ffe5e5; border-color: #c1121f; color: #c1121f; }

    .btn-add {
      width: 100%;
      padding: 11px;
      background: #005B8E;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s;
    }
    .btn-add:hover { background: #0077b6; }

    /* Budget Alert */
    .budget-section { margin-top: 20px; border-top: 1px solid #eee; padding-top: 16px; }
    .budget-section h3 { font-size: 0.88rem; font-weight: 700; color: #555; margin-bottom: 10px; }
    .budget-row { display: flex; gap: 8px; align-items: center; }
    .budget-row input { flex: 1; padding: 8px 10px; border: 1.5px solid #dde3ea; border-radius: 8px; font-size: 0.88rem; }
    .budget-row button { padding: 8px 14px; background: #e9ecef; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    #alertBox {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      display: none;
    }
    #alertBox.warn { background: #fff3cd; color: #856404; border: 1px solid #ffc107; display: block; }
    #alertBox.ok   { background: #d8f3dc; color: #2d6a4f; border: 1px solid #74c69d; display: block; }

    /* ── Right Column ── */
    .right-col { display: flex; flex-direction: column; gap: 20px; }

    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    canvas { max-height: 220px; }

    /* ── Transactions ── */
    #txList { max-height: 320px; overflow-y: auto; }
    .tx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .tx-dot.income  { background: #2d6a4f; }
    .tx-dot.expense { background: #c1121f; }
    .tx-desc { flex: 1; }
    .tx-desc .name { font-size: 0.9rem; font-weight: 600; }
    .tx-desc .meta { font-size: 0.76rem; color: #888; }
    .tx-amount { font-weight: 700; font-size: 0.95rem; }
    .tx-amount.income  { color: #2d6a4f; }
    .tx-amount.expense { color: #c1121f; }
    .tx-del { background: none; border: none; color: #bbb; cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px; }
    .tx-del:hover { color: #c1121f; background: #ffe5e5; }

    .empty-state { text-align: center; color: #bbb; padding: 32px 0; font-size: 0.9rem; }

    @media (max-width: 780px) {
      .main { grid-template-columns: 1fr; }
      .charts-row { grid-template-columns: 1fr; }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <span>💳</span>
  <h1>Personal Finance Tracker</h1>
</header>

<div class="container">

  <!-- Summary Cards -->
  <div class="cards">
    <div class="card income">
      <div class="label">Total Income</div>
      <div class="amount" id="totalIncome">₹0</div>
    </div>
    <div class="card expense">
      <div class="label">Total Expenses</div>
      <div class="amount" id="totalExpense">₹0</div>
    </div>
    <div class="card balance">
      <div class="label">Balance</div>
      <div class="amount" id="balance">₹0</div>
    </div>
  </div>

  <div class="main">

    <!-- Form Panel -->
    <div class="panel">
      <h2>➕ Add Transaction</h2>

      <div class="form-group">
        <label>Type</label>
        <div class="type-toggle">
          <button class="income-btn active" id="btnIncome" onclick="setType('income')">▲ Income</button>
          <button class="expense-btn" id="btnExpense" onclick="setType('expense')">▼ Expense</button>
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Freelance payment, Groceries" />
      </div>

      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="0" min="0" />
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Health">🏥 Health</option>
          <option value="Education">📚 Education</option>
          <option value="Salary">💼 Salary</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" id="date" />
      </div>

      <button class="btn-add" onclick="addTransaction()">Add Transaction</button>

      <!-- Budget Alert -->
      <div class="budget-section">
        <h3>⚠️ Monthly Budget Alert</h3>
        <div class="budget-row">
          <input type="number" id="budgetInput" placeholder="Set monthly budget (₹)" />
          <button onclick="setBudget()">Set</button>
        </div>
        <div id="alertBox"></div>
      </div>
    </div>

    <!-- Right Column -->
    <div class="right-col">

      <!-- Charts -->
      <div class="panel">
        <h2>📊 Spending Overview</h2>
        <div class="charts-row">
          <div><canvas id="barChart"></canvas></div>
          <div><canvas id="pieChart"></canvas></div>
        </div>
      </div>

      <!-- Transactions List -->
      <div class="panel">
        <h2>🧾 Transaction History</h2>
        <div id="txList"><div class="empty-state">No transactions yet. Add one above!</div></div>
      </div>

    </div>
  </div>
</div>

<script>
  let transactions = [];
  let currentType = 'income';
  let monthlyBudget = 0;
  let barChartInst = null;
  let pieChartInst = null;

  // Set today's date as default
  document.getElementById('date').valueAsDate = new Date();

  function setType(type) {
    currentType = type;
    document.getElementById('btnIncome').classList.toggle('active', type === 'income');
    document.getElementById('btnExpense').classList.toggle('active', type === 'expense');
  }

  function addTransaction() {
    const desc   = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const cat    = document.getElementById('category').value;
    const date   = document.getElementById('date').value;

    if (!desc || !amount || amount <= 0 || !date) {
      alert('Please fill in all fields with valid values.');
      return;
    }

    transactions.push({ id: Date.now(), type: currentType, desc, amount, cat, date });

    // Reset form
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('date').valueAsDate = new Date();

    render();
  }

  function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    render();
  }

  function setBudget() {
    monthlyBudget = parseFloat(document.getElementById('budgetInput').value) || 0;
    checkBudget();
  }

  function checkBudget() {
    const box = document.getElementById('alertBox');
    if (!monthlyBudget) { box.style.display = 'none'; return; }
    const totalExp = transactions.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0);
    const pct = (totalExp / monthlyBudget) * 100;
    if (pct >= 100) {
      box.textContent = `🚨 Budget exceeded! Spent ₹${totalExp.toLocaleString()} of ₹${monthlyBudget.toLocaleString()} budget.`;
      box.className = 'warn';
    } else if (pct >= 80) {
      box.textContent = `⚠️ ${pct.toFixed(0)}% of budget used — ₹${(monthlyBudget-totalExp).toLocaleString()} remaining.`;
      box.className = 'warn';
    } else {
      box.textContent = `✅ On track — ₹${(monthlyBudget-totalExp).toLocaleString()} remaining of ₹${monthlyBudget.toLocaleString()}.`;
      box.className = 'ok';
    }
  }

  function render() {
    const income  = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const bal     = income - expense;

    document.getElementById('totalIncome').textContent  = '₹'+income.toLocaleString();
    document.getElementById('totalExpense').textContent = '₹'+expense.toLocaleString();
    const balEl = document.getElementById('balance');
    balEl.textContent = '₹'+bal.toLocaleString();
    balEl.style.color = bal >= 0 ? '#2d6a4f' : '#c1121f';

    renderList();
    renderCharts();
    checkBudget();
  }

  function renderList() {
    const el = document.getElementById('txList');
    if (!transactions.length) {
      el.innerHTML = '<div class="empty-state">No transactions yet. Add one above!</div>';
      return;
    }
    const sorted = [...transactions].sort((a,b) => new Date(b.date)-new Date(a.date));
    el.innerHTML = sorted.map(t => `
      <div class="tx-item">
        <div class="tx-dot ${t.type}"></div>
        <div class="tx-desc">
          <div class="name">${t.desc}</div>
          <div class="meta">${t.cat} · ${t.date}</div>
        </div>
        <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}₹${t.amount.toLocaleString()}</div>
        <button class="tx-del" onclick="deleteTransaction(${t.id})">✕</button>
      </div>
    `).join('');
  }

  function renderCharts() {
    // Bar chart — monthly income vs expense
    const months = {};
    transactions.forEach(t => {
      const m = t.date.slice(0,7);
      if (!months[m]) months[m] = {income:0,expense:0};
      months[m][t.type] += t.amount;
    });
    const labels = Object.keys(months).sort();
    const incData = labels.map(m=>months[m].income);
    const expData = labels.map(m=>months[m].expense);

    if (barChartInst) barChartInst.destroy();
    barChartInst = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: labels.length ? labels : ['No data'],
        datasets: [
          { label: 'Income',  data: incData, backgroundColor: '#74c69d' },
          { label: 'Expense', data: expData, backgroundColor: '#e76f51' }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } },
                   title: { display: true, text: 'Monthly Overview', font: { size: 12 } } },
        scales: { y: { beginAtZero: true } }
      }
    });

    // Pie chart — expense by category
    const catMap = {};
    transactions.filter(t=>t.type==='expense').forEach(t => {
      catMap[t.cat] = (catMap[t.cat]||0) + t.amount;
    });
    const catLabels = Object.keys(catMap);
    const catData   = Object.values(catMap);
    const colors = ['#005B8E','#0077b6','#48cae4','#74c69d','#e76f51','#ffd166','#a8dadc','#e9c46a'];

    if (pieChartInst) pieChartInst.destroy();
    pieChartInst = new Chart(document.getElementById('pieChart'), {
      type: 'doughnut',
      data: {
        labels: catLabels.length ? catLabels : ['No expenses'],
        datasets: [{ data: catData.length ? catData : [1], backgroundColor: colors }]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } },
                   title: { display: true, text: 'Expenses by Category', font: { size: 12 } } }
      }
    });
  }

  render(); // initial render
</script>
</body>
</html>
